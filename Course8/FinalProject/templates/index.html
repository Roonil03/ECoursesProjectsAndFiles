<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon Restaurant</title>
    {% load static %}
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #495E57;
            color: #F4CE14;
            padding: 20px 0;
            font-size: 24px;
        }
        .container {
            padding: 50px;
        }
        img {
            max-width: 300px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #495E57;
        }
        p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        Little Lemon Restaurant
    </header>
    <div class="container">
        <h1>Welcome to Little Lemon!</h1>
        <img src="{% static 'logo.png' %}" alt="Little Lemon Logo">
        <p>
            Experience the finest Mediterranean cuisine right here at Little Lemon. 
            We offer a variety of traditional and contemporary dishes, prepared with 
            the freshest ingredients. Book a table or explore our menu today!
        </p>
    </div>
</body>
</html>
