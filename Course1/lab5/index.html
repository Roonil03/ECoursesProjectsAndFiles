<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon - Responsive Menu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/css/bootstrap.min.css">

    <style>
        body {
            background-color: #e2e4e6;
            color: #1a1a1a;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        h1 {
            margin-top: 20px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        h2 {
            font-size: 2rem;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <img src="logo.png" class="img-fluid" alt="Little Lemon Logo">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <h1>Our Menu</h1>
                </div>
            </div>
        </div>

        <div class="row">

            <div class="col-12 col-lg-6">
                <h2>Falafel</h2>
                <p>Chickpea, herbs, spices.</p>

                <h2>Fried Calamari</h2>
                <p>Squid, buttermilk.</p>
            </div>

            <div class="col-12 col-lg-6">
                <h2>Pasta Salad</h2>
                <p>Lettuce, vegetables, mozzarella.</p>

                <h2>Greek Salad</h2>
                <p>Cucumbers, onion, feta cheese.</p>
            </div>

        </div>

    </div>

    <script src="bootstrap.bundle.min.js"></script>
</body>

</html>
