<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon - Enhanced Menu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #e2e4e6;
            color: #1a1a1a;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        h1 {
            margin-top: 20px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .bg-secondary {
            background-color: #ff9f43 !important;
            font-size: 0.55em;
            vertical-align: middle;
            margin-left: 10px;
        }

        .btn-primary {
            background-color: #721817 !important;
            border-color: #721817 !important;
            padding: 10px 24px;
            font-size: 1.1rem;
            margin-top: 30px;
        }

        h2 {
            font-size: 2rem;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .alert-info {
            text-align: left;
            font-size: 1.1rem;
            background-color: #d1f4ff;
            border-color: #bcebfa;
            color: #0b4d61;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <img src="logo.png" class="img-fluid" alt="Little Lemon Logo">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <h1>Our Menu</h1>
                </div>
                <div class="alert alert-info" role="alert">
                    Our restaurant will be closed on New Year's Day.
                </div>
            </div>
        </div>

        <div class="row">

            <div class="col-12 col-lg-6">
                <h2>Falafel <span class="badge bg-secondary">New</span></h2>
                <p>Chickpea, herbs, spices.</p>

                <h2>Fried Calamari</h2>
                <p>Squid, buttermilk.</p>
            </div>

            <div class="col-12 col-lg-6">
                <h2>Pasta Salad</h2>
                <p>Lettuce, vegetables, mozzarella.</p>

                <h2>Greek Salad</h2>
                <p>Cucumbers, onion, feta cheese.</p>
            </div>

        </div>

        <div class="row">
            <div class="col-12">
                <div class="text-center">
                    <button type="button" class="btn btn-primary">Order Online</button>
                </div>
            </div>
        </div>

    </div>

    <script src="bootstrap.bundle.min.js"></script>
</body>

</html>
